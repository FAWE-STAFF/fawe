<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Staff проекта | Minecraft Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: #f0f3fa;
        }

        /* декоративный фон */
        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(88, 130, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -20vh;
            right: -20vw;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-left {
            left: -30vw;
            top: 40vh;
            background: radial-gradient(circle, rgba(210, 70, 255, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
        }

        .container {
            max-width: 750px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* шапка */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #a9b8ff;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #b9c8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 1rem;
            color: #8f9bb5;
            max-width: 500px;
            margin: 0 auto;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 1rem;
        }

        /* вертикальный список */
        .staff-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin: 2rem 0 2.5rem;
        }

        /* карточка-строка */
        .staff-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1rem 1.5rem 1rem 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .staff-card:hover {
            transform: translateX(6px);
            border-color: rgba(120, 170, 255, 0.5);
            background: rgba(25, 35, 60, 0.85);
        }

        /* аватарка — голова из Minecraft (3D-рендер) */
        .mc-avatar {
            width: 70px;
            height: 70px;
            min-width: 70px;
            background: #1e2a3a;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 18px -6px black;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background-color: #2d3e4b;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .mc-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            image-rendering: pixelated;
        }

        /* fallback иконка */
        .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #2a3a50, #121e2c);
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
        }

        /* инфо-блок */
        .staff-info {
            flex: 2;
            min-width: 160px;
        }

        .staff-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f3ff, #cdd9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .staff-username {
            font-size: 0.8rem;
            color: #8a9bcf;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            margin-top: 4px;
            cursor: pointer;
            transition: 0.1s;
        }

        .staff-username:hover {
            background: rgba(100, 150, 255, 0.3);
            color: white;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(2px);
            padding: 0.35rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 8px;
            width: fit-content;
        }

        .role-badge.owner {
            background: #b8860b30;
            border-left: 3px solid #f5b042;
            color: #ffdfa5;
        }

        .role-badge.sr-mod {
            background: #2c5a9e30;
            border-left: 3px solid #4c9aff;
            color: #bbd4ff;
        }

        .role-badge.helper {
            background: #2c6e4e30;
            border-left: 3px solid #4cdb8c;
            color: #c2f0d2;
        }

        .staff-desc {
            font-size: 0.85rem;
            color: #9dafdf;
            margin-top: 6px;
            line-height: 1.3;
        }

        /* кнопка копирования (маленькая) */
        .copy-hint {
            font-size: 0.7rem;
            margin-left: 6px;
            opacity: 0.6;
            cursor: pointer;
            transition: 0.1s;
        }

        .copy-hint:hover {
            opacity: 1;
        }

        /* футер */
        .footer-note {
            text-align: center;
            background: rgba(5, 10, 22, 0.5);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
        }

        @media (max-width: 560px) {
            .staff-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.2rem;
            }
            .mc-avatar {
                width: 80px;
                height: 80px;
                align-self: center;
            }
            .staff-info {
                width: 100%;
                text-align: center;
            }
            .role-badge {
                margin-left: auto;
                margin-right: auto;
            }
            .staff-desc {
                text-align: center;
            }
            h1 { font-size: 2.2rem; }
        }

        /* тост уведомление */
        .custom-toast {
            transition: opacity 0.25s ease;
            pointer-events: none;
            font-weight: 500;
            backdrop-filter: blur(12px);
            background: rgba(10, 20, 35, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow bg-glow-left"></div>

<div class="container">
    <div class="hero">
        <div class="badge">⛏️ MINECRAFT STAFF ⛏️</div>
        <h1>▸ Команда проекта</h1>
        <div class="sub">Наши лидеры, модерация и помощь — всегда рядом</div>
    </div>

    <div class="staff-list" id="staffList">
        <!-- Динамически через JS добавим карточки, чтобы гарантировать аватарки Minecraft skin (3D головы) -->
    </div>

    <div class="footer-note">
        <div class="stats">
            <div class="stat-item">👑 <strong>2 владельца</strong></div>
            <div class="stat-item">🛡️ <strong>1 ст. модератор</strong></div>
            <div class="stat-item">🤝 <strong>1 хелпер</strong></div>
            <div class="stat-item">📋 <strong>4 staff</strong></div>
        </div>
        <div style="margin-top: 8px; font-size: 0.7rem; opacity: 0.7;">
            💡 Нажмите на никнейм, чтобы скопировать — аватарка загружается с Minecraft skin (голова 3D)
        </div>
        <div style="margin-top: 6px;">© 2025 · Проект _chmonya · Вдохновлено Minecraft</div>
    </div>
</div>

<script>
    // Данные команды в нужном порядке (вертикально)
    // Ники: pluewe, _chmonya, Sseyn2, BAHKIR
    const staffData = [
        {
            nick: "pluewe",
            role: "ВЛАДЕЛЕЦ",
            roleType: "owner",
            description: "Со-основатель, отвечает за сообщество и развитие. Душа проекта и главный стратег.",
            icon: "👑"
        },
        {
            nick: "_chmonya",
            role: "ВЛАДЕЛЕЦ",
            roleType: "owner",
            description: "Основатель проекта. Заведует видением, технической частью и финальными решениями.",
            icon: "⭐"
        },
        {
            nick: "Sseyn2",
            role: "СТАРШИЙ МОДЕРАТОР",
            roleType: "sr-mod",
            description: "Следит за порядком, управляет модерацией, помогает решать конфликты и защищает уют.",
            icon: "🛡️"
        },
        {
            nick: "BAHKIR",
            role: "ХЕЛПЕР",
            roleType: "helper",
            description: "Помощник проекта — всегда на связи, отвечает на вопросы новичков и направляет игроков.",
            icon: "🤝"
        }
    ];

    // Функция генерации URL аватарки Minecraft головы (3D рендер с visage или crafatar)
    // Используем сервис crafatar.com — отдает 3D голову с наклоном? Но нам нужна именно голова (лицо) с 3D эффектом.
    // Лучший вариант для "головы из майнкрафт скина" – использовать рендер 3D головы, например через minotar или crafatar с поворотом.
    // Но чтобы было стильно и похоже на "голову" — используем https://mc-heads.net/avatar/{ник}/60.png?  Но это плоская голова.
    // Для объёмного эффекта можно использовать тот же mc-heads, но есть способ с 3D-рендером: https://mc-heads.net/head/{ник}/100
    // Но самый "майнкрафт-стаффный" вариант — голова в изометрии? 
    // Используем популярный сервис: https://mc-heads.net/avatar/{ник}/90.png — она выглядит как 3D-голова с поворотом (изометрическая проекция)
    // Это дает эффект объёмной головы. Идеально под стиль Minecraft.
    // Дополнительно добавим fallback на случай ошибки загрузки.
    
    function getMinecraftHeadUrl(nickname, size = 80) {
        // mc-heads.net предоставляет 3D-голову с углом, очень похоже на игровую
        // Используем рендер "avatar" который показывает голову с легким поворотом (3D вид)
        // Документация: https://mc-heads.net/ – avatar выдает 3D модель головы, scale=8 отличный вариант
        // Для лучшего качества используем размер 100
        return `https://mc-heads.net/avatar/${encodeURIComponent(nickname)}/${size}.png`;
    }
    
    // Функция копирования
    function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(`Скопирован ник: ${text}`, '#88aaff');
            }).catch(() => fallbackCopy(text));
        } else {
            fallbackCopy(text);
        }
    }
    
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast(`Скопирован ник: ${text}`, '#88aaff');
    }
    
    function showToast(message, color = '#4c9aff') {
        let toast = document.querySelector('.custom-toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.innerText = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '25px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#0f172fe6';
        toast.style.color = '#ffffff';
        toast.style.padding = '10px 24px';
        toast.style.borderRadius = '40px';
        toast.style.fontSize = '0.85rem';
        toast.style.fontWeight = '500';
        toast.style.borderLeft = `4px solid ${color}`;
        toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.4)';
        toast.style.zIndex = '9999';
        toast.style.backdropFilter = 'blur(12px)';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.25s ease';
            setTimeout(() => {
                if (toast && toast.remove) toast.remove();
            }, 300);
        }, 2200);
    }
    
    // Обработчик ошибок загрузки изображения — ставим красивый fallback (первые буквы или иконка)
    function handleImageError(imgElement, nickname) {
        // если картинка не загрузилась, заменим на div с первой буквой
        const parent = imgElement.parentElement;
        if (!parent) return;
        const fallbackDiv = document.createElement('div');
        fallbackDiv.className = 'avatar-fallback';
        // получаем первую букву или символ
        let firstChar = nickname.charAt(0).toUpperCase();
        if (nickname.startsWith('_')) firstChar = '_' + (nickname.charAt(1) || '').toUpperCase();
        fallbackDiv.innerText = firstChar;
        fallbackDiv.style.fontSize = '2rem';
        fallbackDiv.style.fontWeight = 'bold';
        fallbackDiv.style.background = 'linear-gradient(145deg, #2e3f54, #141f2e)';
        parent.innerHTML = ''; // очищаем
        parent.appendChild(fallbackDiv);
        // добавим мини-тултип
        fallbackDiv.title = `Не удалось загрузить скин ${nickname}`;
    }
    
    // Рендер всех карточек в вертикальный список
    function renderStaff() {
        const container = document.getElementById('staffList');
        if (!container) return;
        container.innerHTML = '';
        
        staffData.forEach(member => {
            const card = document.createElement('div');
            card.className = 'staff-card';
            
            // Блок аватарки
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'mc-avatar';
            const img = document.createElement('img');
            const headUrl = getMinecraftHeadUrl(member.nick, 100);
            img.src = headUrl;
            img.alt = `Голова ${member.nick}`;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            img.onerror = function() { handleImageError(this, member.nick); };
            avatarDiv.appendChild(img);
            
            // Инфо блок
            const infoDiv = document.createElement('div');
            infoDiv.className = 'staff-info';
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'staff-name';
            nameSpan.innerText = member.nick;
            
            const usernameSpan = document.createElement('div');
            usernameSpan.className = 'staff-username';
            usernameSpan.innerText = `@${member.nick}`;
            usernameSpan.title = 'Нажмите, чтобы скопировать ник';
            usernameSpan.onclick = (e) => {
                e.stopPropagation();
                copyToClipboard(member.nick);
            };
            
            // Роль бадж
            const roleDiv = document.createElement('div');
            roleDiv.className = `role-badge ${member.roleType}`;
            let roleIcon = '';
            if (member.roleType === 'owner') roleIcon = '👑 ';
            else if (member.roleType === 'sr-mod') roleIcon = '🛡️ ';
            else roleIcon = '🤝 ';
            roleDiv.innerHTML = `${roleIcon}${member.role}`;
            
            const descDiv = document.createElement('div');
            descDiv.className = 'staff-desc';
            descDiv.innerText = member.description;
            
            infoDiv.appendChild(nameSpan);
            infoDiv.appendChild(usernameSpan);
            infoDiv.appendChild(roleDiv);
            infoDiv.appendChild(descDiv);
            
            card.appendChild(avatarDiv);
            card.appendChild(infoDiv);
            
            container.appendChild(card);
        });
    }
    
    // Дополнительно можно добавить перезагрузку аватарок при ошибке сети, но рендер уже обрабатывает onerror
    
    // Также создадим наблюдатель за повторной загрузкой (опционально)
    document.addEventListener('DOMContentLoaded', () => {
        renderStaff();
        // легкая анимация появления карточек
        const cards = document.querySelectorAll('.staff-card');
        cards.forEach((card, idx) => {
            card.style.opacity = '0';
            card.style.transform = 'translateX(-12px)';
            setTimeout(() => {
                card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateX(0)';
            }, idx * 80);
        });
    });
    
    // Обновляем при переключении вкладки на всякий случай (если изображения подгружаются)
    window.addEventListener('load', () => {
        // дополнительная проверка: все img с ошибкой? В рендере уже есть обработчик, но пройдемся по ним
        const allImgs = document.querySelectorAll('.mc-avatar img');
        allImgs.forEach(img => {
            if (!img.complete || img.naturalWidth === 0) {
                // если уже грузится долго, но не сработал onerror, принудительно проверим через таймаут
                setTimeout(() => {
                    if (img.naturalWidth === 0 && !img.getAttribute('data-error-fired')) {
                        img.setAttribute('data-error-fired', 'true');
                        handleImageError(img, img.alt?.replace('Голова ', '') || 'player');
                    }
                }, 1500);
            }
        });
    });
</script>

<!-- добавим небольшие улучшения для ссылок и копирования -->
<style>
    .staff-username {
        cursor: pointer;
        transition: 0.1s linear;
        user-select: none;
    }
    .staff-card .mc-avatar {
        transition: transform 0.2s;
    }
    .staff-card:hover .mc-avatar {
        transform: scale(1.02);
    }
    .role-badge {
        box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    ::selection {
        background: #2f4b9e;
        color: white;
    }
    /* небольшой отступ для имён */
    .staff-name {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
    }
    /* на случай длинных ников */
    @media (max-width: 450px) {
        .staff-name {
            font-size: 1.3rem;
        }
        .role-badge {
            font-size: 0.65rem;
        }
    }
</style>
</body>
</html>
