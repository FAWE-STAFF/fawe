<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Staff проекта | Minecraft Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Плавный анимированный градиентный фон */
            background: linear-gradient(125deg, #0a0f1e, #11172b, #0c1022, #161e38);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: #f0f3fa;
            position: relative;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* дополнительный светящийся ореол для атмосферы */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(88, 130, 255, 0.08) 0%, rgba(0,0,0,0) 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 70%, rgba(210, 70, 255, 0.06) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 750px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* шапка */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #a9b8ff;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #b9c8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 1rem;
            color: #8f9bb5;
            max-width: 500px;
            margin: 0 auto;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 1rem;
        }

        /* вертикальный список */
        .staff-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin: 2rem 0 2.5rem;
        }

        /* карточка-строка — без аватара, компактная */
        .staff-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1rem 1.8rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .staff-card:hover {
            transform: translateX(6px);
            border-color: rgba(120, 170, 255, 0.5);
            background: rgba(25, 35, 60, 0.85);
        }

        /* инфо-блок с ником */
        .staff-info {
            flex: 2;
            min-width: 150px;
        }

        .staff-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f3ff, #cdd9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        /* роль — компактный бейдж */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(2px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            width: fit-content;
            white-space: nowrap;
        }

        .role-badge.owner {
            background: #b8860b30;
            border-left: 3px solid #f5b042;
            color: #ffdfa5;
        }

        .role-badge.sr-mod {
            background: #2c5a9e30;
            border-left: 3px solid #4c9aff;
            color: #bbd4ff;
        }

        .role-badge.helper {
            background: #2c6e4e30;
            border-left: 3px solid #4cdb8c;
            color: #c2f0d2;
        }

        /* футер */
        .footer-note {
            text-align: center;
            background: rgba(5, 10, 22, 0.5);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
        }

        @media (max-width: 560px) {
            .staff-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 1.2rem 1.5rem;
            }
            .staff-info {
                width: 100%;
                text-align: center;
            }
            .role-badge {
                margin-left: auto;
                margin-right: auto;
            }
            h1 { font-size: 2.2rem; }
            .staff-name {
                text-align: center;
            }
        }

        /* никаких аватарок, никаких кнопок копирования, никаких описаний */
        .staff-username, .copy-hint, .staff-desc, .mc-avatar, .avatar-fallback {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="badge">⛏️ MINECRAFT STAFF ⛏️</div>
        <h1>▸ Команда проекта</h1>
        <div class="sub">Наши лидеры, модерация и помощь — всегда рядом</div>
    </div>

    <div class="staff-list" id="staffList">
        <!-- Список будет заполнен динамически: только ник и роль, без аватарок, описаний и кнопок копирования -->
    </div>

    <div class="footer-note">
        <div class="stats">
            <div class="stat-item">👑 <strong>2 владельца</strong></div>
            <div class="stat-item">🛡️ <strong>1 ст. модератор</strong></div>
            <div class="stat-item">🤝 <strong>1 хелпер</strong></div>
            <div class="stat-item">📋 <strong>4 staff</strong></div>
        </div>
        <div style="margin-top: 8px; font-size: 0.7rem; opacity: 0.7;">
            ✨ Администрация проекта _chmonya
        </div>
        <div style="margin-top: 6px;">© 2025 · Проект _chmonya · Вдохновлено Minecraft</div>
    </div>
</div>

<script>
    // Данные команды: только ники и роли. Описания удалены, аватарки не используются.
    const staffData = [
        {
            nick: "pluewe",
            role: "ВЛАДЕЛЕЦ",
            roleType: "owner"
        },
        {
            nick: "_chmonya",
            role: "ВЛАДЕЛЕЦ",
            roleType: "owner"
        },
        {
            nick: "Sseyn2",
            role: "СТАРШИЙ МОДЕРАТОР",
            roleType: "sr-mod"
        },
        {
            nick: "BAHKIR",
            role: "ХЕЛПЕР",
            roleType: "helper"
        }
    ];

    // Рендер карточек: только ник + роль, без аватарок, без копирования, без описаний
    function renderStaff() {
        const container = document.getElementById('staffList');
        if (!container) return;
        container.innerHTML = '';
        
        staffData.forEach(member => {
            const card = document.createElement('div');
            card.className = 'staff-card';
            
            // Блок с ником
            const infoDiv = document.createElement('div');
            infoDiv.className = 'staff-info';
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'staff-name';
            nameSpan.innerText = member.nick;
            
            infoDiv.appendChild(nameSpan);
            
            // Бадж роли
            const roleDiv = document.createElement('div');
            roleDiv.className = `role-badge ${member.roleType}`;
            let roleIcon = '';
            if (member.roleType === 'owner') roleIcon = '👑 ';
            else if (member.roleType === 'sr-mod') roleIcon = '🛡️ ';
            else roleIcon = '🤝 ';
            roleDiv.innerHTML = `${roleIcon}${member.role}`;
            
            card.appendChild(infoDiv);
            card.appendChild(roleDiv);
            
            container.appendChild(card);
        });
    }
    
    // Анимация появления карточек
    document.addEventListener('DOMContentLoaded', () => {
        renderStaff();
        const cards = document.querySelectorAll('.staff-card');
        cards.forEach((card, idx) => {
            card.style.opacity = '0';
            card.style.transform = 'translateX(-12px)';
            setTimeout(() => {
                card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateX(0)';
            }, idx * 80);
        });
    });
</script>

<style>
    /* дополнительные гарантии, что ничего лишнего не появится */
    .staff-username, .copy-hint, .staff-desc, .mc-avatar, .avatar-fallback, [onclick], .staff-username:hover {
        display: none !important;
        pointer-events: none !important;
    }
    .role-badge {
        user-select: none;
    }
    ::selection {
        background: #2f4b9e;
        color: white;
    }
    @media (max-width: 450px) {
        .staff-name {
            font-size: 1.3rem;
        }
        .role-badge {
            font-size: 0.7rem;
            padding: 0.3rem 1rem;
        }
    }
</style>
</body>
</html>
