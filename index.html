<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FAWE STAFF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Плавный анимированный градиентный фон */
            background: linear-gradient(125deg, #0a0f1e, #11172b, #0c1022, #161e38);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: #f0f3fa;
            position: relative;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* декоративные свечения */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(88, 130, 255, 0.08) 0%, rgba(0,0,0,0) 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 70%, rgba(210, 70, 255, 0.06) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 750px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        /* шапка */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #a9b8ff;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #b9c8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 1rem;
            color: #8f9bb5;
            max-width: 500px;
            margin: 0 auto;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 1rem;
        }

        /* секции (группы должностей) */
        .role-group {
            background: rgba(10, 15, 28, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .role-group:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(12, 18, 32, 0.6);
        }

        /* заголовок группы (должность) */
        .group-header {
            padding: 1rem 1.5rem;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
        }

        .group-header span:first-child {
            font-size: 1.5rem;
        }

        /* список участников внутри группы */
        .members-list {
            padding: 0.5rem 0;
        }

        .member-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
            gap: 1rem;
        }

        .member-item:last-child {
            border-bottom: none;
        }

        .member-item:hover {
            background: rgba(255, 255, 255, 0.03);
            padding-left: 1.8rem;
        }

        /* аватарка — КВАДРАТНАЯ, без скруглений, рамка цвета группы */
        .member-avatar {
            width: 42px;
            height: 42px;
            min-width: 42px;
            background: #1e2a3a;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
            /* квадрат! border-radius: 0 */
            border-radius: 0;
            /* рамка будет задана динамически через style в JS */
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* fallback если аватар не загрузился — тоже квадратный */
        .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #2a3a50, #121e2c);
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border-radius: 0;
        }

        .member-info {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .member-nick {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #f5f7ff, #cfddff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .member-status {
            font-size: 0.7rem;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.4);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .empty-message {
            padding: 0.9rem 1.8rem;
            color: #8f9bb5;
            font-style: italic;
            font-size: 0.95rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* футер */
        .footer-note {
            text-align: center;
            background: rgba(5, 10, 22, 0.5);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin-top: 2rem;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
        }

        @media (max-width: 560px) {
            h1 { font-size: 2.2rem; }
            .group-header { font-size: 1.1rem; padding: 0.8rem 1.2rem; }
            .member-nick { font-size: 1rem; }
            .member-item { padding: 0.7rem 1rem; flex-wrap: wrap; }
            .member-info { flex-wrap: wrap; gap: 0.6rem; }
            .member-status { font-size: 0.6rem; }
            .member-avatar { width: 38px; height: 38px; min-width: 38px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="badge">FAWE</div>
        <h1>Команда Проекта</h1>
        <div class="sub"></div>
    </div>

    <div class="roles-container" id="rolesContainer">
        <!-- Группы будут сгенерированы динамически -->
    </div>

    <div class="footer-note">
        <div class="stats">
            <div class="stat-item"><strong>2 владельца</strong></div>
            <div class="stat-item"><strong>1 куратор</strong></div>
            <div class="stat-item"><strong>0 ст. модераторов</strong></div>
            <div class="stat-item"><strong>0 модераторов</strong></div>
            <div class="stat-item"><strong>3 хелпера</strong></div>
        </div>
        <div style="margin-top: 8px; font-size: 0.7rem; opacity: 0.7;">
        </div>
        <div style="margin-top: 6px;">© 2026 · FAWE</div>
    </div>
</div>

<script>
    // Данные о должностях (цвета, список участников)
    const roleGroups = [
        {
            title: "Владельцы",
            icon: "",
            color: "#FF0000",      // красный
            members: ["_chmonya", "pluewe"]
        },
        {
            title: "Куратор",
            icon: "",
            color: "#FF1493",      // DeepPink
            members: ["Sseyn2"]
        },
        {
            title: "Старший модератор",
            icon: "",
            color: "#0000CD",      // MediumBlue
            members: []
        },
        {
            title: "Модератор",
            icon: "",
            color: "#00BFFF",      // DeepSkyBlue
            members: []
        },
        {
            title: "Хелпер",
            icon: "",
            color: "#19CF2A",      // зеленый
            members: ["BAHKIR", "itzWeid", "azxsdcvv", "relokeight"]
        }
    ];

    // Функция получения аватарки через Minotar (размер 32) — квадратная голова
    function getAvatarUrl(nickname) {
        return `https://minotar.net/avatar/${encodeURIComponent(nickname)}/32.png`;
    }

    // Обработка ошибки загрузки аватарки (ставим первую букву ника)
    function handleAvatarError(imgElement, nickname, groupColor) {
        const parent = imgElement.parentElement;
        if (!parent) return;
        const fallbackDiv = document.createElement('div');
        fallbackDiv.className = 'avatar-fallback';
        let firstChar = nickname.charAt(0).toUpperCase();
        if (nickname.startsWith('_')) firstChar = '_' + (nickname.charAt(1) || '').toUpperCase();
        fallbackDiv.innerText = firstChar;
        fallbackDiv.style.fontSize = '1rem';
        fallbackDiv.style.fontWeight = 'bold';
        fallbackDiv.style.background = `linear-gradient(145deg, ${groupColor}80, ${groupColor}30)`;
        fallbackDiv.style.borderRadius = '0';
        parent.innerHTML = '';
        parent.appendChild(fallbackDiv);
        fallbackDiv.title = ``;
    }

    // Функция для генерации всего списка групп
    function renderRoleGroups() {
        const container = document.getElementById('rolesContainer');
        if (!container) return;
        container.innerHTML = '';

        roleGroups.forEach(group => {
            // Создаем блок группы
            const groupDiv = document.createElement('div');
            groupDiv.className = 'role-group';
            
            // Заголовок группы с цветом
            const header = document.createElement('div');
            header.className = 'group-header';
            header.style.borderBottom = `2px solid ${group.color}`;
            header.innerHTML = `
                <span>${group.icon}</span>
                <span style="color: ${group.color}; text-shadow: 0 0 4px rgba(0,0,0,0.3);">${group.title}</span>
            `;
            
            // Список участников
            const membersListDiv = document.createElement('div');
            membersListDiv.className = 'members-list';
            
            if (group.members.length === 0) {
                // Пустая группа — показываем "Никто"
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-message';
                emptyDiv.innerHTML = `<span></span> Никого <span></span>`;
                membersListDiv.appendChild(emptyDiv);
            } else {
                // Перебираем участников
                group.members.forEach(member => {
                    const memberDiv = document.createElement('div');
                    memberDiv.className = 'member-item';
                    
                    // Блок аватарки (квадратный) с рамкой цвета группы
                    const avatarDiv = document.createElement('div');
                    avatarDiv.className = 'member-avatar';
                    // Устанавливаем рамку цвета группы (2px solid)
                    avatarDiv.style.border = `2px solid ${group.color}`;
                    avatarDiv.style.boxShadow = `0 0 0 1px rgba(0,0,0,0.2)`;
                    
                    const img = document.createElement('img');
                    const avatarUrl = getAvatarUrl(member);
                    img.src = avatarUrl;
                    img.alt = `Аватар ${member}`;
                    img.onerror = function() { handleAvatarError(this, member, group.color); };
                    avatarDiv.appendChild(img);
                    
                    // Блок информации (ник + статус)
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'member-info';
                    
                    const nickSpan = document.createElement('div');
                    nickSpan.className = 'member-nick';
                    nickSpan.innerText = member;
                    
                    const statusSpan = document.createElement('div');
                    statusSpan.className = 'member-status';
                    statusSpan.style.backgroundColor = `${group.color}20`;
                    statusSpan.style.borderLeft = `3px solid ${group.color}`;
                    statusSpan.style.color = '#eef3ff';
                    
                    // Правильное отображение роли (для единственного числа)
                    let roleText = group.title;
                    if (group.title === "Владельцы") roleText = "Владелец";
                    if (group.title === "Хелперы") roleText = "Хелпер";
                    if (group.title === "Куратор") roleText = "Куратор";
                    if (group.title === "Старший модератор") roleText = "Ст. модератор";
                    if (group.title === "Модератор") roleText = "Модератор";
                    statusSpan.innerText = roleText;
                    
                    infoDiv.appendChild(nickSpan);
                    infoDiv.appendChild(statusSpan);
                    
                    memberDiv.appendChild(avatarDiv);
                    memberDiv.appendChild(infoDiv);
                    membersListDiv.appendChild(memberDiv);
                });
            }
            
            groupDiv.appendChild(header);
            groupDiv.appendChild(membersListDiv);
            container.appendChild(groupDiv);
        });
    }

    // Анимация появления групп при загрузке + дополнительная проверка загрузки аватарок
    document.addEventListener('DOMContentLoaded', () => {
        renderRoleGroups();
        
        // Плавное появление групп
        const groups = document.querySelectorAll('.role-group');
        groups.forEach((group, idx) => {
            group.style.opacity = '0';
            group.style.transform = 'translateY(15px)';
            setTimeout(() => {
                group.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                group.style.opacity = '1';
                group.style.transform = 'translateY(0)';
            }, idx * 100);
        });
        
        // Дополнительная проверка аватарок (если долго грузятся или ошибка не сработала)
        setTimeout(() => {
            const allAvatars = document.querySelectorAll('.member-avatar img');
            allAvatars.forEach(img => {
                if (!img.complete || img.naturalWidth === 0) {
                    if (!img.getAttribute('data-error-checked')) {
                        img.setAttribute('data-error-checked', 'true');
                        const parent = img.closest('.member-avatar');
                        if (parent) {
                            const memberItem = img.closest('.member-item');
                            if (memberItem) {
                                const nickElement = memberItem.querySelector('.member-nick');
                                if (nickElement) {
                                    const nickname = nickElement.innerText;
                                    // Пытаемся определить цвет группы по рамке родителя
                                    let groupColor = "#FF0000";
                                    const avatarDiv = img.closest('.member-avatar');
                                    if (avatarDiv) {
                                        const borderColor = avatarDiv.style.borderColor;
                                        if (borderColor && borderColor !== '') {
                                            groupColor = borderColor;
                                        }
                                    }
                                    handleAvatarError(img, nickname, groupColor);
                                }
                            }
                        }
                    }
                }
            });
        }, 1500);
    });
</script>

<style>
    /* дополнительные стили: квадратные аватарки, без скруглений */
    .member-avatar {
        border-radius: 0 !important;
    }
    .member-avatar img {
        border-radius: 0 !important;
    }
    .avatar-fallback {
        border-radius: 0 !important;
    }
    
    /* эффект при наведении на аватарку */
    .member-item:hover .member-avatar {
        transform: scale(1.05);
        box-shadow: 0 0 0 2px rgba(255,215,0,0.7);
    }
    
    .member-status {
        backdrop-filter: blur(2px);
        font-weight: 600;
    }
    
    .empty-message {
        font-family: monospace;
        letter-spacing: 0.3px;
    }
    
    ::-webkit-scrollbar {
        width: 5px;
    }
    ::-webkit-scrollbar-track {
        background: #0f1422;
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
        background: #2e3a5e;
        border-radius: 10px;
    }
    
    .role-group {
        transition: transform 0.2s, border-color 0.2s;
    }
    
    .member-nick {
        transition: 0.1s;
    }
    
    .member-item:hover .member-nick {
        text-shadow: 0 0 5px rgba(255,255,200,0.5);
    }
    
    .member-info {
        flex-wrap: wrap;
        align-items: baseline;
    }
</style>
</body>
</html>
